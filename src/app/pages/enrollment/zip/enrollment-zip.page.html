<div class="card p-4">
  <h3 class="mb-3">Where do you need service?</h3>
  <p class="text-muted mb-4">
    Enter the ZIP code for the location where you need electricity service.
    We will show you available plans in your area.
  </p>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <label for="zipCode" class="form-label">ZIP Code</label>
      <input
        type="text"
        class="form-control form-control-lg text-center"
        id="zipCode"
        placeholder="e.g. 75001"
        maxlength="5"
        [ngModel]="zipCode()"
        (ngModelChange)="zipCode.set($event)">
    </div>
  </div>
  <div class="text-end mt-4">
    <button class="btn btn-primary btn-lg" (click)="onNext()" [disabled]="!canProceed()">
      View Plans &rarr;
    </button>
  </div>
</div>
