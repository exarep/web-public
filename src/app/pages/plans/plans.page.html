<section class="hero-section text-center" style="padding: 4rem 0;">
  <div class="container">
    <h1 class="display-4 fw-bold mb-3">Our "Plans"</h1>
    <p class="lead mx-auto" style="max-width: 600px;">
      Beautifully designed pricing for electricity we cannot actually sell you. Compare rates that
      mean nothing and pick the plan that sparks joy.
    </p>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <h3 class="mb-3">Enter your ZIP code to see available plans</h3>
        <p class="text-muted mb-4">Plan availability and TDSP charges vary by service area.</p>
        <div class="input-group input-group-lg">
          <input
            type="text"
            class="form-control text-center"
            placeholder="Enter your ZIP code"
            maxlength="5"
            [ngModel]="zipCode()"
            (ngModelChange)="zipCode.set($event)"
            (keyup.enter)="onZipSubmit()">
          <button class="btn btn-primary px-4" (click)="onZipSubmit()" [disabled]="zipCode().length !== 5">
            View Plans
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
